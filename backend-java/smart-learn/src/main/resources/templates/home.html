<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart-Learn | Online Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .hero-section { background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 60px 20px; text-align: center; margin-bottom: 30px; }
        .course-card { transition: transform 0.3s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        .card-img-top { height: 180px; object-fit: cover; }
        .category-badge { background-color: #e3f2fd; color: #1e88e5; font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; font-weight: bold; }
        .btn-start { width: 100%; background-color: #2c3e50; color: white; }
    </style>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1e3c72;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fas fa-brain"></i> SMART-LEARN</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/about">About </a></li>
            </ul>
        </div>
    </div>
</nav>
</head>
<body>

    <div class="hero-section">
        <h1>Welcome to Smart-Learn</h1>
        <p class="lead">The World's First AI-Adaptive Learning Platform</p>
    </div>

    <div class="container mb-5">
        <h3 class="mb-4">Recommended for You</h3>
        
        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
            
            <div class="col" th:each="course : ${courses}">
                <div class="card course-card h-100">
                    <img th:src="${course.thumbnail}" class="card-img-top" alt="Thumbnail">
                    
                    <div class="card-body d-flex flex-column">
                        <span class="category-badge mb-2 w-auto align-self-start" th:text="${course.category}">Category</span>
                        <h5 class="card-title" th:text="${course.title}">Course Title</h5>
                        <p class="card-text text-muted small">Updated Jan 2026</p>
                        
                        <div class="mt-auto">
                            <a th:href="@{/watch(id=${course.id}, title=${course.title})}" class="btn btn-start">Start Learning</a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
